<!DOCTYPE html>

        <div class="expe" id="experience"></div>

    </div>

    <div class="inventario" id="inventario">
        <div class="parte">
            <div class="armor">
                <div class="armadur" id="armor"></div>
                <div class="armor-steve"></div>
            </div>
            <div class="craft">

                <div class="setaa">
                    <div class="seta"></div>
                </div>
                <div class="res">
                    <div class="block"></div>
                </div>
            </div>
        </div>

        <div class="parte2">
            <div class="ivi" id="hot-inve"></div>
        </div>

        <div class="hot-inv">
            <div class="bar-hot" id="bar"></div>
        </div>

    <script src="script.js"></script>

</html>
