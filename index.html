<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Portifolio</title>
</head>

<body>

    <header class="cabecalho">
        <div class="titulo">
            <h2>System interface</h2>
            <span id="status"></span>
        </div>
        


        <div class="btn">
            <button id="on">Ligar</button>
            <button id="off">Desligar</button>
        </div>
    </header>
    <main class="principal">
        <section class="mine" id="mine" class="page">
            <div class="hot-bar">
                <div class="hot" id="hot"></div>
            </div>
        </section>


        <section class="terminal-p" id="terminalp">
            <div class="terminal" id="terminal">
                <div class="line">
                    <span class="prompt">user@dev:~$</span>
                    <input class="terminal-input" autofocus />
                </div>
            </div>
        </section>
        <div class="site" id="site">
            <section class="hero">
                <div class="hero-info">
                    <h1 class="page">Giovani Manzatto Furlan - System</h1>
                    <p class="page">Estou Com objeto de construir sistemas que conectam Software com Hardware, algo que eu posso envolver Web
                        para o fisico.</p>
                    <div class="btn-config">
                        <button class="page">Configuração</button>
                        <button class="page">Telas</button>
                        <button id="btnterminal" class="page">Terminal</button>
                    </div>
                    
                </div>
                <div class="image" class="page">
                        
                </div>
            </section>
        </div>


    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="assets/js/script.js" defer></script>
</body>

</html>
