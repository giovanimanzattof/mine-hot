<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Portifolio</title>
</head>

<body>

    <header class="cabecalho">
        <div class="titulo">
            <h2>System interface</h2>
            <span id="status"></span>
        </div>


        <div class="btn">
            <button id="on">Ligar</button>
            <button id="off">Desligar</button>
        </div>
    </header>
    <main class="principal">
        <section class="mine">
            <div class="hot-bar">
                <div class="hot" id="hot"></div>
            </div>
            <div class="inventario" id="inventario">
                <div class="parte">
                    <div class="armor">
                        <div class="armor-steve" id="armorsteve">
                            <div class="line" id="armorline">
                                <span class="prompt">user@dev:~$</span>
                                <input class="terminal-input" autofocus />
                            </div>
                        </div>
                    </div>
                </div>
                <div class="parte2">
                    <div class="ivi" id="hot-inve"></div>
                </div>
                <div class="hot-inv">
                    <div class="bar-hot" id="bar"></div>
                </div>
            </div>
        </section>

        <section class="terminal-p" id="terminalp">
            <div class="terminal" id="terminal">
                <div class="line">
                    <span class="prompt">user@dev:~$</span>
                    <input class="terminal-input" autofocus />
                </div>
            </div>
        </section>
        <div class="site">
            <section class="hero">
                <div class="hero-info">
                    <h1>Giovani Manzatto Furlan - System</h1>
                    <p>Estou Com objeto de construir sistemas que conectam Software com Hardware, algo que eu posso envolver Web
                        para o fisico.</p>
                    <div class="btn-config">
                        <button>Configuração</button>
                        <button>Telas</button>
                        <button id="btnterminal">Terminal</button>
                    </div>
                    
                </div>
                <div class="image">
                        
                </div>
            </section>
        </div>


    </main>


    <script src="assets/js/script.js" defer></script>
</body>

</html>
